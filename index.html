    /* ── Pages ── */

      opacity: 0; pointer-events: none; transform: scale(1.03);
    }

      animation: slowzoom 18s ease-in-out infinite alternate;

      from { transform: scale(1.04); }
      to   { transform: scale(1.12); }

    /* ── Overlays ── */
    .overlay { position: absolute; inset: 0; }
    #ov1 { background: linear-gradient(to top, rgba(10,6,2,0.65) 0%, rgba(10,6,2,0.15) 50%, transparent 100%); }
    #ov2 { background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,10,0.7) 100%); }

    /* ── Text ── */
    h1 {
      position: relative; z-index: 2;
      font-style: italic; font-weight: 400;
      font-size: clamp(3rem, 10vw, 8rem);
      color: #fff; letter-spacing: 0.01em;
      opacity: 0;
      animation: fadein 2s ease forwards 0.4s;
    }
    #page1 h1 { text-shadow: 0 2px 40px rgba(255,160,60,0.45), 0 0 120px rgba(255,120,0,0.2); }
    #page2 h1 { text-shadow: 0 2px 40px rgba(80,160,255,0.5), 0 0 120px rgba(100,80,255,0.3); }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Nav dots ── */
    .nav {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 1rem; z-index: 10;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 1.5px solid rgba(255,255,255,0.6);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: #fff; transform: scale(1.3); }

    /* ── Arrow buttons ── */
    .arrow {
      position: fixed; top: 50%; z-index: 10;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 1.4rem;
      width: 44px; height: 44px;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
    }
    .arrow:hover { background: rgba(255,255,255,0.25); }
    #prev { left: 1.5rem; }
    #next { right: 1.5rem; }
    .arrow.invisible { opacity: 0; pointer-events: none; }

  <!-- Page 1 -->
  <div class="page" id="page1">
    <div class="bg" id="bg1"></div>
    <div class="overlay" id="ov1"></div>
    <h1>Hi World</h1>
  </div>

  <!-- Page 2 -->
  <div class="page hidden" id="page2">
    <div class="bg" id="bg2"></div>
    <div class="overlay" id="ov2"></div>
    <h1>Bye</h1>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <div class="dot active" onclick="goTo(0)"></div>
    <div class="dot" onclick="goTo(1)"></div>
  </div>
  <button class="arrow invisible" id="prev" onclick="goTo(current-1)">&#8592;</button>
  <button class="arrow" id="next" onclick="goTo(current+1)">&#8594;</button>

  <script>
    const pages = document.querySelectorAll(".page");
    const dots  = document.querySelectorAll(".dot");
    const prev  = document.getElementById("prev");
    const next  = document.getElementById("next");
    let current = 0;

    function goTo(n) {
      pages[current].classList.add("hidden");
      dots[current].classList.remove("active");
      current = Math.max(0, Math.min(n, pages.length - 1));
      pages[current].classList.remove("hidden");
      dots[current].classList.add("active");
      // re-trigger text animation
      const h1 = pages[current].querySelector("h1");
      h1.style.animation = "none";
      h1.offsetHeight;
      h1.style.animation = "";
      prev.classList.toggle("invisible", current === 0);
      next.classList.toggle("invisible", current === pages.length - 1);
    }

    // Keyboard navigation
    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") goTo(current + 1);
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   goTo(current - 1);
    });
  </script>
